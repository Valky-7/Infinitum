<section class="mx-auto grid max-w-7xl gap-8 px-5 py-14 sm:px-8 lg:grid-cols-[0.8fr_1.2fr] lg:py-20">
  <div>
    <p class="text-sm font-bold uppercase text-cyan-200">Contato</p>
    <h1 class="mt-3 text-4xl font-black text-white sm:text-5xl">Conecte-se com a equipe Infinitum</h1>
    <p class="mt-5 leading-8 text-slate-300">
      Envie uma mensagem para discutir o perfil nacional, os riscos da infraestrutura digital ou estrategias de continuidade economica.
    </p>

    <div class="mt-8 rounded-2xl border border-white/10 bg-white/4 p-6">
      <h2 class="font-bold text-white">Equipe</h2>
      <div class="mt-4 space-y-3 text-slate-300">
        <p class="rounded-lg bg-slate-950/40 px-4 py-3">Kauan Gramkow</p>
        <p class="rounded-lg bg-slate-950/40 px-4 py-3">Pietro Henrique Alegri Stappazzoli</p>
        <p class="rounded-lg bg-slate-950/40 px-4 py-3">Sofia Eduarda Mafra Correa</p>
      </div>
    </div>
  </div>

  <form class="rounded-2xl border border-cyan-300/20 bg-slate-950/60 p-6 shadow-2xl shadow-slate-950/40 backdrop-blur-xl sm:p-8">
    <div class="grid gap-5 sm:grid-cols-2">
      <label class="text-sm font-semibold text-slate-200">
        Nome
        <input
          type="text"
          placeholder="Seu nome"
          class="mt-2 w-full rounded-lg border border-white/10 bg-white/6 px-4 py-3 text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-200 focus:bg-white/8"
        />
      </label>

      <label class="text-sm font-semibold text-slate-200">
        Email
        <input
          type="email"
          placeholder="voce@email.com"
          class="mt-2 w-full rounded-lg border border-white/10 bg-white/6 px-4 py-3 text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-200 focus:bg-white/8"
        />
      </label>
    </div>

    <label class="mt-5 block text-sm font-semibold text-slate-200">
      Mensagem
      <textarea
        placeholder="Escreva sua mensagem"
        class="mt-2 h-40 w-full resize-none rounded-lg border border-white/10 bg-white/6 px-4 py-3 text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-200 focus:bg-white/8"
      ></textarea>
    </label>

    <button class="mt-6 w-full rounded-lg bg-cyan-300 px-6 py-3 font-black text-slate-950 shadow-xl shadow-cyan-950/30 transition hover:bg-cyan-200 sm:w-auto">
      Enviar mensagem
    </button>
  </form>
</section>
